run_now:
  name: Run now
  description: >-
    Run one moisture-model cycle immediately (in addition to the scheduled run).
    Useful from a dashboard button or an automation. With "force" on, it sends the
    flying nudge regardless of the exposure thresholds, quiet hours, or cooldown.
  fields:
    force:
      name: Force notification
      description: Send the Telegram nudge even if thresholds/quiet-hours/cooldown would suppress it.
      required: false
      default: false
      selector:
        boolean:
    chart_history_days:
      name: Chart lookback (days)
      description: >-
        Override the alert chart's history window for this run only. Leave blank to
        use the configured "Alert chart history (days)" option.
      required: false
      selector:
        number:
          min: 7
          max: 180
          step: 1
          unit_of_measurement: d
          mode: box
